name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  check-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: cachix/install-nix-action@v20
      - name: Evaluate supported outputs
        run: |
          nix flake check --all-systems --no-build --print-build-logs

  build-home-configuration:
    needs: check-flake
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: wslfish
          - check: revel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: cachix/install-nix-action@v20

      - uses: cachix/cachix-action@v12
        with:
          name: pecigonzalo
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build activation package
        run: |
          nix build --print-build-logs .#checks.x86_64-linux.${{ matrix.check }}

  build-darwin-configuration:
    needs: check-flake
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: githubCI
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: cachix/install-nix-action@v20

      - uses: cachix/cachix-action@v12
        with:
          name: pecigonzalo
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build system
        run: |
          nix build --print-build-logs .#checks.aarch64-darwin.${{ matrix.check }}
