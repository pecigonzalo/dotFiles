apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: traefik
  namespace: kube-system
spec:
  chart: traefik
  repo: https://helm.traefik.io/traefik
  valuesContent: |-
    logs:
      level: "INFO"
      access:
        enabled: true
    ingressRoute:
      dashboard:
        entryPoints:
          - web
          - traefik
    global:
      checkNewVersion: false
      sendAnonymousUsage: false
